version: 2

sources:
  - name: clickstream_raw
    database: clickstream-pipeline-484705
    schema: clickstream
    tables:
      - name: clickstream_partitioned_clustered
        description: "Partitioned + clustered clickstream raw event table"
        columns:
          - name: event_time
            description: "Event timestamp"
          - name: event_type
            description: "Event type (view, cart, purchase)"
          - name: product_id
            description: "Product ID"
          - name: category_id
            description: "Category ID"
          - name: category_code
            description: "Category code (e.g. electronics.smartphone)"
          - name: brand
            description: "Brand name"
          - name: price
            description: "Product price"
          - name: user_id
            description: "User ID"
          - name: user_session
            description: "User session ID"
          - name: event_date
            description: "Event date (partition column)"
          - name: event_month
            description: "Event month (partition column)"
          - name: event_month_date
            description: "First day of the event month (DATE)"
