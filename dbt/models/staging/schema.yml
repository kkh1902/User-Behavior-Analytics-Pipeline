version: 2

models:
  - name: stg_clickstream
    description: "Cleaned clickstream events (view/cart/purchase only)"
    columns:
      - name: event_type
        description: "Event type"
        tests:
          - accepted_values:
              arguments:
                values: ['view', 'cart', 'purchase']
      - name: user_id
        tests:
          - not_null
      - name: user_session
        tests:
          - not_null
      - name: product_id
        tests:
          - not_null
