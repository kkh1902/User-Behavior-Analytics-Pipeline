version: 2

models:
  - name: fct_funnel_events
    description: "Funnel stage flags at session + product level (whether view/cart/purchase was reached)"
    config:
      contract:
        enforced: true
    columns:
      - name: user_id
        data_type: int64
      - name: user_session
        data_type: string
      - name: product_id
        data_type: int64
      - name: category_main
        data_type: string
      - name: brand
        data_type: string
      - name: price
        data_type: float64
      - name: event_date
        data_type: date
        tests:
          - not_null
      - name: event_month
        data_type: string
      - name: event_month_date
        data_type: date
      - name: has_view
        data_type: int64
      - name: has_cart
        data_type: int64
      - name: has_purchase
        data_type: int64
      - name: funnel_stage
        data_type: string
        description: "Highest funnel stage reached"
        tests:
          - accepted_values:
              arguments:
                values: ['view', 'cart', 'purchase']

  - name: mart_funnel
    description: "Conversion rate aggregation by category/brand/month using a consistent population (for Looker Studio, 0-100%)"
    config:
      contract:
        enforced: true
    columns:
      - name: event_month
        data_type: string
      - name: event_month_date
        data_type: date
      - name: category_main
        data_type: string
      - name: brand
        data_type: string
      - name: view_count
        data_type: int64
      - name: cart_count
        data_type: int64
      - name: purchase_count
        data_type: int64
      - name: view_to_cart_rate
        data_type: float64
        description: "view → cart conversion rate (%)"
      - name: cart_to_purchase_rate
        data_type: float64
        description: "cart → purchase conversion rate (%)"
      - name: overall_conversion_rate
        data_type: float64
        description: "view → purchase overall conversion rate (%)"

  - name: mart_daily_funnel_kpi
    description: "Daily funnel KPI based on consistent population (0-100% guaranteed)"
    config:
      contract:
        enforced: true
    columns:
      - name: event_date
        data_type: date
        tests:
          - not_null
      - name: event_month
        data_type: string
      - name: event_month_date
        data_type: date
      - name: category_main
        data_type: string
      - name: brand
        data_type: string
      - name: view_sessions
        data_type: int64
        tests:
          - not_null
      - name: view_to_cart_sessions
        data_type: int64
      - name: cart_sessions
        data_type: int64
        tests:
          - not_null
      - name: cart_to_purchase_sessions
        data_type: int64
      - name: view_to_purchase_sessions
        data_type: int64
      - name: view_to_cart_rate
        data_type: float64
      - name: cart_to_purchase_rate
        data_type: float64
      - name: overall_conversion_rate
        data_type: float64
